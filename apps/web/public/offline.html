<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#059669" />
    <title>Sem conexão — Soccer Predictions</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        padding: 1.5rem;
      }

      main {
        max-width: 28rem;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }

      button {
        margin-top: 1.5rem;
        border: 0;
        border-radius: 0.5rem;
        background: #059669;
        color: #fff;
        font: inherit;
        font-weight: 600;
        padding: 0.75rem 1.25rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Você está offline</h1>
      <p>
        Não foi possível carregar esta página. Verifique sua conexão e tente
        novamente.
      </p>
      <button type="button" onclick="window.location.reload()">
        Tentar novamente
      </button>
    </main>
  </body>
</html>
